---
# Source de vérité de l'ordre des labs et de leur regroupement en sections.
# Le README.md racine est généré depuis ce fichier par scripts/render-readme.py.
#
# Pour insérer un nouveau lab : ajouter son ID stable dans la section voulue.
# Pour réordonner : déplacer la ligne. Pas de mv à faire.

repo:
  id: ansible-training
  category: ansible             # 'ansible' | 'kubernetes' | 'linux' | 'terraform' | …
  title: "Ansible Training — RHCE EX294 2026"
  blog_url: "https://blog.stephane-robert.info/docs/infra-as-code/gestion-de-configuration/ansible/"
  description: |
    Lab pédagogique public de la formation Ansible RHCE EX294 2026.
    Chaque lab est autonome : tutoriel guidé + challenge testé par pytest+testinfra.

# Topologie consommée par `dsoxlab provision`. Terraform et les templates
# cloud-init sont packagés DANS dsoxlab : ce dépôt ne déclare que la cible.
# Les IP ne sont pas déclarées, Terraform les attribue et l'inventaire les lit.
infra:
  provider: kvm                 # kvm | incus | outscale (seuls providers packagés)
  network: lab-ansible          # réseau libvirt dédié, pour cohabiter avec les
  cidr: 10.10.20.0/24           # autres labs sans collision de sous-réseau
  hosts:
    - name: control-node.lab
      distro: alma9
      role: control-node
      ram_mb: 2048
      vcpu: 2
      disk_gb: 20
    - name: web1.lab
      distro: alma9
      role: managed-node
      ram_mb: 1024
      vcpu: 1
      disk_gb: 10
    - name: web2.lab
      distro: alma9
      role: managed-node
      ram_mb: 1024
      vcpu: 1
      disk_gb: 10
    - name: db1.lab
      distro: alma9
      role: managed-node
      ram_mb: 1536
      vcpu: 1
      disk_gb: 15
      # Disque additionnel pour les labs de stockage (modules-rhel/parted,
      # filesystem, lvm-storage) : partitionnement GPT, systèmes de fichiers,
      # volumes logiques. Apparaît dans la VM comme /dev/vdb (kvm/incus).
      #
      # Sans lui, ces labs fabriquaient un loop device via un shell ad hoc dans
      # conftest._PRE_CLEANUPS, pendant que leur énoncé parlait de /dev/vdb :
      # l'apprenant qui suivait le README échouait à la validation.
      extra_disk_gb: 5

sections:
  - id: bootstrap
    title: "Bootstrap"
    description: "Préparation système des managed nodes (jouée par `dsoxlab provision`)."
    # Le champ `auto_run: true` a été retiré ici : dsoxlab 0.1.6 ne le lit pas
    # (SectionDefinition n'expose que id/title/description/labs), c'était donc
    # un no-op silencieux. Conséquence assumée : `dsoxlab next` proposera ce lab
    # d'amorçage comme un lab normal au lieu de le sauter.
    labs:
      - bootstrap/prepare-managed-nodes

  - id: decouvrir
    title: "Découvrir Ansible"
    description: "Premiers contacts : déclaratif vs impératif, installation, CLI, configuration."
    labs:
      - decouvrir/declaratif-vs-imperatif
      - decouvrir/installation-ansible
      - decouvrir/configuration-ansible
      - decouvrir/prise-en-main-cli

  - id: premiers-pas
    title: "Premiers pas"
    description: "Premier playbook, premiers secrets vault."
    labs:
      - premiers-pas/premier-playbook
      - premiers-pas/ansible-vault

  - id: ecrire-code
    title: "Écrire du code Ansible"
    description: "Structure d'un play, contrôle d'exécution, variables, Jinja2, conditions, boucles, gestion d'erreurs."
    labs:
      - ecrire-code/plays-et-tasks
      - ecrire-code/handlers
      - ecrire-code/tags
      - ecrire-code/checkmode-diff
      - ecrire-code/variables-base
      - ecrire-code/types-collections
      - ecrire-code/facts-magic-vars
      - ecrire-code/custom-facts
      - ecrire-code/precedence-variables
      - ecrire-code/register-set-fact
      - ecrire-code/parallelisme-strategies
      - ecrire-code/async-poll
      - ecrire-code/delegation
      - ecrire-code/lookups
      - ecrire-code/jinja2-base
      - ecrire-code/filtres-jinja-essentiels
      - ecrire-code/conditions-when
      - ecrire-code/boucles-loop
      - ecrire-code/boucles-with-deprecated
      - ecrire-code/block-rescue-always
      - ecrire-code/failed-when-changed-when
      - ecrire-code/ignore-errors
      - ecrire-code/any-errors-fatal
      - ecrire-code/filtres-jinja-avances
      - ecrire-code/tests-jinja
      - ecrire-code/module-template
      - ecrire-code/lineinfile-vs-template
      - ecrire-code/import-include

  - id: modules-fichiers
    title: "Modules fichiers"
    description: "Manipulation de fichiers : copy, file, blockinfile, lineinfile, replace, fetch, archive."
    labs:
      - modules-fichiers/copy
      - modules-fichiers/file
      - modules-fichiers/blockinfile
      - modules-fichiers/lineinfile
      - modules-fichiers/replace
      - modules-fichiers/fetch
      - modules-fichiers/archive-unarchive

  - id: modules-paquets
    title: "Modules paquets"
    description: "Gestion paquets agnostique (package), options dnf, dépôts RPM."
    labs:
      - modules-paquets/package
      - modules-paquets/dnf-options
      - modules-paquets/yum-repository

  - id: modules-services
    title: "Modules services"
    description: "Gestion services systemd et tâches planifiées cron."
    labs:
      - modules-services/systemd
      - modules-services/cron

  - id: modules-utilisateurs
    title: "Modules utilisateurs"
    description: "Gestion users, groups, clés SSH, sudoers."
    labs:
      - modules-utilisateurs/user
      - modules-utilisateurs/group
      - modules-utilisateurs/authorized-key
      - modules-utilisateurs/sudoers

  - id: modules-rhel
    title: "Modules RHEL"
    description: "Spécificités RHEL : firewalld, SELinux, sysctl, mount, parted, filesystem, LVM."
    labs:
      - modules-rhel/firewalld
      - modules-rhel/sysctl
      - modules-rhel/selinux
      - modules-rhel/mount
      - modules-rhel/parted
      - modules-rhel/filesystem
      - modules-rhel/lvm-storage

  - id: modules-reseau
    title: "Modules réseau"
    description: "Téléchargement et appels HTTP : get_url, uri."
    labs:
      - modules-reseau/get-url
      - modules-reseau/uri

  - id: modules-diagnostic
    title: "Modules diagnostic"
    description: "Inspection et synchronisation : stat, find, assert/fail, wait_for/pause."
    labs:
      - modules-diagnostic/stat
      - modules-diagnostic/find
      - modules-diagnostic/assert-fail
      - modules-diagnostic/wait-for-pause

  - id: inventaires
    title: "Inventaires"
    description: "group_vars/host_vars, patterns d'hôtes, inventaire dynamique libvirt."
    labs:
      # Fondement de la section : on écrit un inventaire statique de zéro avant
      # d'apprendre à cibler avec des patterns ou à le générer dynamiquement.
      - inventaires/statiques
      - inventaires/group-vars-host-vars
      - inventaires/patterns-hotes
      - inventaires/dynamique-kvm

  - id: roles
    title: "Rôles"
    description: "Anatomie d'un rôle, variables, handlers, argument_specs, consommation, dépendances, rôles système RHEL."
    labs:
      - roles/creer-premier-role
      - roles/variables-defaults-vars
      - roles/handlers-meta
      - roles/argument-specs
      - roles/consommer-role
      - roles/dependencies
      # Aboutissement de la section : on ne construit plus un rôle, on consomme
      # celui de l'éditeur. C'est l'objectif EX294 « Use RHEL system roles »,
      # et le seul lab l3 de la section.
      - roles/system-roles

  - id: molecule
    title: "Tests Molecule"
    description: "Cycle TDD avec Molecule, scénarios multi-distro."
    labs:
      - molecule/introduction
      - molecule/installation-config
      - molecule/tdd-cycle
      - molecule/scenarios-multi-distro

  - id: tests
    title: "Tests Python & lint"
    description: "testinfra, tox multi-version, ansible-lint profil production."
    labs:
      - tests/testinfra
      - tests/tox-multiversion
      - tests/ansible-lint-production

  - id: ci
    title: "CI/CD"
    description: "Pipelines GitHub Actions et GitLab CI pour rôles et collections."
    labs:
      - ci/github-actions
      - ci/gitlab

  - id: galaxy
    title: "Galaxy & publication"
    description: "ansible-galaxy CLI, requirements.yml, audit de rôles tiers, versioning et publication."
    labs:
      - galaxy/ansible-galaxy-cli
      - galaxy/installer-roles
      - galaxy/auditer-role-existant
      - galaxy/versionner-publier

  - id: vault
    title: "Ansible Vault"
    description: "Vault complet : encrypt_string, vault-id multiples, mixtes, dans rôles, intégration HashiCorp/Passbolt."
    labs:
      - vault/introduction
      - vault/chiffrer-fichier-variable
      - vault/id-multiples
      - vault/playbooks-mixtes
      - vault/dans-roles
      - vault/integration-hashicorp
      - vault/integration-passbolt

  - id: ee
    title: "Execution Environments"
    description: "ansible-navigator, ansible-builder, EE custom, pipeline CI, debug."
    labs:
      - ee/hello
      - ee/inspection
      - ee/builder-custom
      - ee/ci-pipeline
      - ee/debug

  - id: troubleshooting
    title: "Troubleshooting"
    description: "Verbosité, debugger interactif, idempotence et performance."
    labs:
      - troubleshooting/verbosite
      - troubleshooting/debugger
      - troubleshooting/idempotence-perfs

  - id: collections
    title: "Collections"
    description: "Découverte, requirements, création, CI tests, migration depuis un rôle."
    labs:
      - collections/decouvrir
      - collections/navigator
      - collections/requirements
      - collections/creer-custom
      - collections/ci-tests
      - collections/migration-role

  - id: pratiques
    title: "Pratiques avancées"
    description: "Versionner ses playbooks avec Git, ansible-pull mode GitOps."
    labs:
      - pratiques/versionner-git
      - pratiques/ansible-pull-gitops

  - id: rhce
    title: "Examen RHCE EX294"
    description: "Mocks examen complets 4h, 19 tâches chacun, validées par pytest."
    labs:
      - rhce/mock-ex294
      - rhce/mock-ex294-2
