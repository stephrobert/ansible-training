#cloud-config
users:
  - name: admin
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: sudo
    shell: /bin/bash
    lock_passwd: false
    passwd: "{{ 'admin' | password_hash('sha512') }}"
package_update: true
package_upgrade: true
packages:
  - python3-pip
  - pipx
  - git
  - python3-venv
  - openssh-server
write_files:
  - path: /home/admin/.profile
    content: |
       export PATH=$PATH:/home/admin/.local/bin
    append: true
runcmd:
  - systemctl enable ssh
  - systemctl start ssh
  - chown -R admin:admin /home/admin
