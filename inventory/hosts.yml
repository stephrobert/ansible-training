---
# Inventaire stable du lab Ansible
# Représente la topologie pédagogique de référence citée dans tous les guides
# de la formation RHCE.

all:
  vars:
    ansible_user: ansible
    # `inventory_dir` est toujours le dossier `inventory/` du repo, peu importe
    # d'ou on lance ansible-playbook (racine, sous-dossier de lab, dossier de
    # solution). Plus stable que `playbook_dir` qui change selon la position
    # du fichier .yml execute.
    ansible_ssh_private_key_file: "{{ inventory_dir }}/../ssh/id_ed25519"
    ansible_python_interpreter: /usr/bin/python3.12

  children:
    control:
      hosts:
        control-node.lab:
          ansible_host: 10.10.20.10

    webservers:
      hosts:
        web1.lab:
          ansible_host: 10.10.20.21
        web2.lab:
          ansible_host: 10.10.20.22

    dbservers:
      hosts:
        db1.lab:
          ansible_host: 10.10.20.31

    # Groupe parent qui regroupe les serveurs gérés (utilisé par les labs RHCE)
    rhce_lab:
      children:
        webservers:
        dbservers:
