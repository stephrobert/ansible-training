---
# Inventaire stable du lab Ansible
# Représente la topologie pédagogique de référence citée dans tous les guides
# de la formation RHCE.

all:
  vars:
    ansible_user: ansible
    # Le `playbook_dir | default('.')` donne le path correct quand on lance
    # `ansible-playbook` depuis la racine du repo (cas standard via les
    # Makefiles qui font `cd $(LAB_ROOT) && ansible-playbook ...`).
    ansible_ssh_private_key_file: "{{ playbook_dir | default('.') }}/ssh/id_ed25519"
    ansible_python_interpreter: /usr/bin/python3.12

  children:
    control:
      hosts:
        control-node.lab:
          ansible_host: 10.10.20.10

    webservers:
      hosts:
        web1.lab:
          ansible_host: 10.10.20.21
        web2.lab:
          ansible_host: 10.10.20.22

    dbservers:
      hosts:
        db1.lab:
          ansible_host: 10.10.20.31

    # Groupe parent qui regroupe les serveurs gérés (utilisé par les labs RHCE)
    rhce_lab:
      children:
        webservers:
        dbservers:
