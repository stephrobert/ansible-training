---
# Inventaire stable du lab Ansible
# Représente la topologie pédagogique de référence citée dans tous les guides
# de la formation RHCE.

all:
  vars:
    # `ansible` est le compte de SERVICE que le cloud-init de dsoxlab pose sur
    # chaque VM (clé SSH, sudo NOPASSWD) : c'est le compte de connexion de
    # l'automatisation depuis dsoxlab 0.1.14. `student` est le compte HUMAIN,
    # sur le control node, et ne doit JAMAIS servir ici.
    #
    # Ne pas rebasculer sur `student` : les labs qui restreignent l'accès SSH
    # (AllowUsers) visent `ansible`, et l'inverser verrouillerait l'automatisation
    # hors des nœuds qu'elle vient de provisionner.
    ansible_user: ansible

    # Aucun `ansible_host` n'est déclaré ici : Terraform attribue les IP, et
    # les figer dans cet inventaire les rendait fausses au premier
    # reprovisionnement. La résolution passe par le ssh_config que dsoxlab
    # génère depuis son inventaire dynamique (outputs Terraform + meta.yml) :
    # il porte les adresses réelles, l'utilisateur et la clé.
    #
    # Il est régénéré à chaque `dsoxlab provision`. S'il manque, provisionner.
    ansible_ssh_common_args: >-
      -F {{ lookup('env', 'HOME') }}/.cache/dsoxlab/ansible-training/ssh_config
      -o StrictHostKeyChecking=no
      -o UserKnownHostsFile=/dev/null

    # `inventory_dir` est toujours le dossier `inventory/` du repo, peu importe
    # d'ou on lance ansible-playbook (racine, sous-dossier de lab, dossier de
    # solution). Plus stable que `playbook_dir` qui change selon la position
    # du fichier .yml execute.
    ansible_ssh_private_key_file: "{{ inventory_dir }}/../ssh/id_ed25519"
    ansible_python_interpreter: /usr/bin/python3.9

  children:
    # Le noeud de contrôle LOCAL, déclaré explicitement, et c'est délibéré.
    #
    # Un play `hosts: localhost` visait jusqu'ici le localhost IMPLICITE, qui
    # n'appartient à aucune source d'inventaire. Deux conséquences, toutes deux
    # rencontrées en écrivant des labs :
    #
    #  - `become = True` d'ansible.cfg s'applique à lui : un play localhost
    #    écrivait EN ROOT dans le dépôt du formateur.
    #  - `inventory_dir` n'est pas défini pour un hôte implicite, donc le
    #    `ansible_ssh_private_key_file` posé sur `all` explosait en
    #    « 'inventory_dir' is undefined ».
    #
    # Le déclarer ici lui donne une source d'inventaire (donc `inventory_dir`)
    # et permet de neutraliser `become` pour lui seul. Aucun lab ne cible
    # `hosts: all` (vérifié) : cet ajout n'élargit la cible d'aucun play.
    local:
      hosts:
        localhost:
          ansible_connection: local
          ansible_become: false
          ansible_python_interpreter: "{{ ansible_playbook_python }}"

    control:
      hosts:
        control-node.lab:

    webservers:
      hosts:
        web1.lab:
        web2.lab:

    dbservers:
      hosts:
        db1.lab:

    # Groupe parent qui regroupe les serveurs gérés (utilisé par les labs RHCE)
    rhce_lab:
      children:
        webservers:
        dbservers:
