[defaults]
inventory = ./inventory/hosts.yml
host_key_checking = False
retry_files_enabled = False
forks = 10
stdout_callback = ansible.builtin.default
result_format = yaml
callbacks_enabled = ansible.posix.profile_tasks, ansible.posix.timer
gathering = smart
fact_caching = jsonfile
fact_caching_connection = ./.ansible_facts
# ATTENTION : ce cache survit à un `dsoxlab destroy && dsoxlab provision`, car il
# vit dans le dépôt et non sur les VM. Après un changement de distribution, il
# rejoue les facts de l'ANCIENNE (mesuré : 86 tests en erreur au passage
# d'AlmaLinux 10 à 9, `ansible_distribution_major_version` restant à « 10 » ;
# les labs qui composent une URL avec — EPEL, dépôts — pointaient donc EL10 sur
# une EL9, et dnf partait en OOM sur les métadonnées incompatibles).
# Purger le cache fait partie de toute bascule de distro : `rm -rf .ansible_facts/`.
fact_caching_timeout = 7200
# `ansible` est le compte de SERVICE provisionné par dsoxlab sur chaque VM
# (clé SSH, sudo NOPASSWD) : c'est lui que l'automatisation utilise pour se
# connecter. `student` est le compte HUMAIN, sur le control node. Les playbooks
# des labs se connectent donc en `ansible` ; inventory/hosts.yml le réaffirme en
# group var (`ansible_user: ansible`), qui prime pour les hôtes du lab.
remote_user = ansible
private_key_file = ./ssh/id_ed25519
# `auto` plutôt qu'un chemin piné : le pin /usr/bin/python3.12 (AlmaLinux 10)
# cassait toutes les tâches dès le passage à AlmaLinux 9, qui fournit 3.9.
interpreter_python = auto
pipelining = True

[privilege_escalation]
become = True
become_method = sudo
become_ask_pass = False

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/dev/null
control_path = ~/.ssh/cm-%%r@%%h:%%p
