---
id: rhce-mock-ex294
title: "RHCE EX294 mock exam: 19 tasks in 4 hours"
description: "Work through 19 timed tasks covering inventories, variables, vault, files, packages, services, roles, error handling, rolling waves, delegation, tags, scheduled jobs, custom facts and content collections, each validated by pytest."
section: rhce
level: l3
difficulty: advanced
lab_type: capstone
estimated_time: "4h"
skills:
  - rhce-exam-prep
  - playbook-authoring
  - time-management
  # Ajoutés avec les tâches 13 à 18. Chacune de ces compétences est enseignée
  # par un lab dédié de la formation : le capstone n'examine que du déjà vu.
  - block-rescue-always
  - error-handling
  - serial-rolling-update
  - delegate-to
  - run-once
  - tags
  - cron
  - custom-facts
  - facts-d
  - content-collections
  - requirements-yml
distros:
  - alma9
doc_url: https://blog.stephane-robert.info/docs/infra-as-code/gestion-de-configuration/ansible/certifications/rhce/
certification_tags:
  - rhce
runtime:
  type: vm
  targets:
    - name: rhce
      host: control-node.lab
      label_en: "AlmaLinux 9 control node"
      label_fr: "Control node AlmaLinux 9"
      roles:
        db1: db1.lab
        web1: web1.lab
        web2: web2.lab
  default: rhce
validation:
  functional: true
  # L'examen porte sur SELinux (booléen persistant) et sur le pare-feu
  # permanent : le durcissement fait partie du sujet, pas du décor.
  security: true
  # Prouvé, pas supposé : test_99 redémarre web1 et db1, puis re-vérifie
  # l'état runtime. Déclarer `false` sur le lab qui certifie la persistance
  # était le trou le plus gênant du capstone.
  persistence_after_reboot: true
