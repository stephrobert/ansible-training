---
# Reset du lab variables-defaults-vars : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup variables-defaults-vars lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset name, state, enabled (variables-defaults-vars)
      ansible.builtin.systemd_service:
        name: "nginx"
        state: "stopped"
        enabled: "no"
      failed_when: false
    - name: Reset name, state (variables-defaults-vars)
      ansible.builtin.dnf:
        name: "nginx"
        state: "absent"
      failed_when: false
    - name: Reset path, state (variables-defaults-vars)
      ansible.builtin.file:
        path: "/usr/share/nginx/html/index.html"
        state: "absent"
      failed_when: false
