---
# Mise en place du lab argument-specs : état de départ propre, puis brief.
# Rejouable : l'apprenant doit pouvoir recommencer autant qu'il veut.
- name: Setup argument-specs lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset name, state, enabled (argument-specs)
      ansible.builtin.systemd_service:
        name: "nginx"
        state: "stopped"
        enabled: "no"
      failed_when: false
    - name: Reset name, state (argument-specs)
      ansible.builtin.dnf:
        name: "nginx"
        state: "absent"
      failed_when: false
    - name: Reset port, state, permanent, immediate (argument-specs)
      ansible.posix.firewalld:
        port: "8090/tcp"
        state: "disabled"
        permanent: "yes"
        immediate: "yes"
      failed_when: false

- name: Brief the learner (argument-specs)
  hosts: lab_db1
  gather_facts: false
  tasks:
    - name: What this lab expects from you
      ansible.builtin.debug:
        msg: >-
          Write meta/argument_specs.yml to type, constrain and document input variables, then watch an invalid input get rejected automatically
      run_once: true
