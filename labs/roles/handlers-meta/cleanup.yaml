---
# Reset du lab handlers-meta : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup handlers-meta lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset name, state, enabled (handlers-meta)
      ansible.builtin.systemd_service:
        name: "nginx"
        state: "stopped"
        enabled: "no"
      failed_when: false
    - name: Reset name, state (handlers-meta)
      ansible.builtin.dnf:
        name: "nginx"
        state: "absent"
      failed_when: false
    - name: Reset state (handlers-meta)
      ansible.builtin.shell: |
        rm -f /var/log/webserver-deploy.log /var/log/deploy-notification.log
      changed_when: false
      failed_when: false
    - name: Reset port, state, permanent, immediate (handlers-meta)
      ansible.posix.firewalld:
        port: "8080/tcp"
        state: "disabled"
        permanent: "yes"
        immediate: "yes"
      failed_when: false
