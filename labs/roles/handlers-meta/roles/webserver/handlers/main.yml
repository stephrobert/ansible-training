---
# handlers/main.yml — actions réactives notifiées par tasks/

- name: Restart nginx
  ansible.builtin.systemd_service:
    name: "{{ webserver_package }}"
    state: restarted

- name: Reload nginx
  ansible.builtin.systemd_service:
    name: "{{ webserver_package }}"
    state: reloaded

# Handler « hors service » : un handler n'est pas forcément un systemd_service.
# Son contenu est stable, comme celui de la tâche qui le notifie. La preuve que
# ce handler a tourné n'est pas un horodatage dans le fichier, c'est le fichier
# lui-même : le setup du lab l'efface, donc s'il est là, c'est ce déploiement
# qui l'a écrit.
- name: Notify deployment
  ansible.builtin.copy:
    dest: /var/log/deploy-notification.log
    content: |
      Deployment completed
      Host: {{ inventory_hostname }}
      Webserver port: {{ webserver_listen_port }}
    mode: "0644"
