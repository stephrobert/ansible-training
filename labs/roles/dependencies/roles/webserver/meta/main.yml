---
# meta/main.yml — c'est ICI que le challenge se joue.
#
# Le rôle webserver a deux prérequis structurels : SELinux dans le bon
# mode (rôle selinux_setup) et le pare-feu prêt avec les bons ports
# (rôle firewall_setup). À vous de les déclarer dans `dependencies:`
# pour qu'ils s'exécutent AVANT ce rôle, dans cet ordre, avec les
# variables attendues par le challenge (cf. challenge/README.md).

galaxy_info:
  author: Stéphane Robert
  namespace: stephrobert
  role_name: webserver
  description: Webserver avec dépendances (firewall + selinux)
  license: MIT
  min_ansible_version: "2.16"
  platforms:
    - name: EL
      versions: ["9", "10"]
  galaxy_tags:
    - nginx
    - webserver

# À compléter : selinux_setup (selinux_setup_state) puis firewall_setup
# (firewall_setup_open_ports), chacun avec ses vars.
dependencies: []
