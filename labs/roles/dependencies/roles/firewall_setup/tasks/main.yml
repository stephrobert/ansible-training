---
- name: Tracer l'ordre d'exécution (preuve pour le challenge)
  ansible.builtin.lineinfile:
    path: /tmp/deps-order.txt
    line: firewall_setup
    create: true
    mode: "0644"

- name: Démarrer et activer firewalld
  ansible.builtin.systemd_service:
    name: firewalld
    state: started
    enabled: true

- name: Ouvrir les ports demandés par l'appelant
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
  loop: "{{ firewall_setup_open_ports }}"
