---
# Reset du lab consommer-role : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup consommer-role lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset name, state, enabled (consommer-role)
      ansible.builtin.systemd_service:
        name: "nginx"
        state: "stopped"
        enabled: "no"
      failed_when: false
    - name: Reset name, state (consommer-role)
      ansible.builtin.dnf:
        name: "nginx"
        state: "absent"
      failed_when: false
    - name: Reset firewalld port 8080 (consommer-role)
      ansible.posix.firewalld:
        port: "8080/tcp"
        state: "disabled"
        permanent: "yes"
        immediate: "yes"
      failed_when: false
    - name: Reset trace files (consommer-role)
      ansible.builtin.shell: |
        rm -f /tmp/consommer-*.txt
      changed_when: false
      failed_when: false
