---
# Reset du lab systemd : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup systemd lab (lab_web1)
  hosts: lab_web1
  become: true
  gather_facts: false
  tasks:
    - name: Reset state (systemd)
      ansible.builtin.shell: |
        systemctl disable --now lab-marker 2>/dev/null; rm -f /etc/systemd/system/lab-marker.service /var/run/lab-marker.flag; systemctl daemon-reload; true
      changed_when: false
      failed_when: false
