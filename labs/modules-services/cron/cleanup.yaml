---
# Reset du lab cron : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup cron lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset path, state (cron)
      ansible.builtin.file:
        path: "/etc/cron.d/lab-rhce"
        state: "absent"
