---
# Reset du lab group : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup group lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset state (group)
      ansible.builtin.shell: |
        groupdel rhce-shared 2>/dev/null; groupdel rhce-admins 2>/dev/null; groupdel rhce-readonly 2>/dev/null; groupdel myapp-system 2>/dev/null; true
      changed_when: false
      failed_when: false
