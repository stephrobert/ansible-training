---
# Reset du lab sudoers : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup sudoers lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset state (sudoers)
      ansible.builtin.shell: |
        rm -f /etc/sudoers.d/lab-rhce-*; groupdel ops-team 2>/dev/null; true
      changed_when: false
      failed_when: false
