; tox.ini — tester le rôle webserver sur plusieurs versions ansible-core
; Pattern : `tox` lance tous les environnements ; `tox -e ansible-2.18` cible un seul.

[tox]
envlist = ansible-2.{16,17,18}
skipsdist = true

[testenv]
commands = molecule test
setenv =
    TOX_ENVNAME={envname}
    PY_COLORS=1
    ANSIBLE_FORCE_COLOR=1
    ANSIBLE_ROLES_PATH=../
passenv = *

[testenv:ansible-2.16]
basepython = python3.10
deps =
    ansible-core==2.16.*
    ansible-lint==24.*
    molecule>=25.0
    molecule-plugins[podman]>=25.0
    requests
    pytest

[testenv:ansible-2.17]
basepython = python3.10
deps =
    ansible-core==2.17.*
    ansible-lint==24.*
    molecule>=25.0
    molecule-plugins[podman]>=25.0
    requests
    pytest

[testenv:ansible-2.18]
basepython = python3.12
deps =
    ansible-core==2.18.*
    ansible-lint==25.*
    molecule>=26.0
    molecule-plugins[podman]>=25.0
    requests
    pytest

; Lint séparé — fail-fast
[testenv:lint]
basepython = python3.12
deps =
    ansible-lint==25.*
    yamllint
commands =
    yamllint roles/
    ansible-lint --profile=production roles/
