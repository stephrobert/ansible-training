---
# tasks/main.yml : rôle hérité d'un ancien projet, fonctionnel mais
# écrit à la va-vite. Votre mission (voir challenge/README.md) : le
# remettre au niveau du profil production d'ansible-lint SANS changer
# son comportement.
- name: Installer le paquet nginx
  dnf:
    name: "{{ webserver_package }}"
    state: "{{ webserver_state }}"

- file:
    path: /etc/nginx/conf.d/default.conf
    state: absent
  notify: Restart nginx

- name: Déployer nginx.conf depuis le template
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    mode: 644
    backup: true
    validate: nginx -t -c %s
  notify: Restart nginx

- name: Déployer la page d'accueil personnalisée
  copy:
    dest: "{{ __webserver_html_dir }}/index.html"
    content: "{{ webserver_index_content }}\n"

- name: Ouvrir le port HTTP custom dans firewalld
  ansible.posix.firewalld:
    port: "{{ webserver_listen_port }}/tcp"
    permanent: true
    immediate: true
    state: enabled
  ignore_errors: yes

- name: Démarrer et activer nginx
  shell: systemctl enable --now {{ webserver_package }}
