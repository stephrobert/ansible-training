---
# Reset du lab conditions-when : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup conditions-when lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset state (conditions-when)
      ansible.builtin.shell: |
        rm -f /tmp/cond-*.txt
      changed_when: false
      failed_when: false
