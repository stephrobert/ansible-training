---
# Mise en place du lab conditions-when : état de départ propre, puis brief.
# Rejouable : l'apprenant doit pouvoir recommencer autant qu'il veut.
- name: Setup conditions-when lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset state (conditions-when)
      ansible.builtin.shell: |
        rm -f /tmp/cond-*.txt
      changed_when: false
      failed_when: false

- name: Brief the learner (conditions-when)
  hosts: lab_db1
  gather_facts: false
  tasks:
    - name: What this lab expects from you
      ansible.builtin.debug:
        msg: >-
          Gate a task on a fact, combine several conditions, test whether a variable is defined and diagnose a when that matches wrongly
      run_once: true
