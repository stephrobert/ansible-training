---
# Reset du lab delegation : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup delegation lab (labenv)
  hosts: labenv
  become: true
  gather_facts: false
  tasks:
    - name: Reset state (delegation)
      ansible.builtin.shell: |
        rm -f /tmp/delegation-on-*.txt
      changed_when: false
      failed_when: false
