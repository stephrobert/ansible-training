---
# Mise en place du lab filtres-jinja-essentiels : état de départ propre, puis brief.
# Rejouable : l'apprenant doit pouvoir recommencer autant qu'il veut.
- name: Setup filtres-jinja-essentiels lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset path, state (filtres-jinja-essentiels)
      ansible.builtin.file:
        path: "/tmp/filtres-result.txt"
        state: "absent"

- name: Brief the learner (filtres-jinja-essentiels)
  hosts: lab_db1
  gather_facts: false
  tasks:
    - name: What this lab expects from you
      ansible.builtin.debug:
        msg: >-
          Handle missing variables with default, work on lists, filter a list of dicts with selectattr and map, merge dicts with combine
      run_once: true
