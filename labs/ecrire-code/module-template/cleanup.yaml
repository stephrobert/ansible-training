---
# Reset du lab module-template : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup module-template lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset state (module-template)
      ansible.builtin.shell: |
        rm -f /etc/banner.txt /etc/banner.txt.*
      changed_when: false
      failed_when: false
