---
# Reset du lab variables-base : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup variables-base lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset path, state (variables-base)
      ansible.builtin.file:
        path: "/tmp/challenge-vars.txt"
        state: "absent"
