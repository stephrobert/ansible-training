---
# Mise en place du lab ignore-errors : état de départ propre, puis brief.
# Rejouable : l'apprenant doit pouvoir recommencer autant qu'il veut.
- name: Setup ignore-errors lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset path, state (ignore-errors)
      ansible.builtin.file:
        path: "/tmp/ignore-after.txt"
        state: "absent"

- name: Brief the learner (ignore-errors)
  hosts: lab_db1
  gather_facts: false
  tasks:
    - name: What this lab expects from you
      ansible.builtin.debug:
        msg: >-
          Measure the effect of ignore_errors on the PLAY RECAP, spot its few legitimate cases and prefer failed_when or block/rescue
      run_once: true
