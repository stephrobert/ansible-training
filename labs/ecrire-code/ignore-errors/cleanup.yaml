---
# Reset du lab ignore-errors : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup ignore-errors lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset path, state (ignore-errors)
      ansible.builtin.file:
        path: "/tmp/ignore-after.txt"
        state: "absent"
