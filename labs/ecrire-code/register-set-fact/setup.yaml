---
# Mise en place du lab register-set-fact : état de départ propre, puis brief.
# Rejouable : l'apprenant doit pouvoir recommencer autant qu'il veut.
- name: Setup register-set-fact lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset path, state (register-set-fact)
      ansible.builtin.file:
        path: "/tmp/system-id.txt"
        state: "absent"

- name: Brief the learner (register-set-fact)
  hosts: lab_db1
  gather_facts: false
  tasks:
    - name: What this lab expects from you
      ansible.builtin.debug:
        msg: >-
          Capture module output with register, reuse it in when and loop, create a runtime fact and persist it with cacheable: true
      run_once: true
