---
# Mise en place du lab types-collections : état de départ propre, puis brief.
# Rejouable : l'apprenant doit pouvoir recommencer autant qu'il veut.
- name: Setup types-collections lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset path, state (types-collections)
      ansible.builtin.file:
        path: "/tmp/services-production.txt"
        state: "absent"

- name: Brief the learner (types-collections)
  hosts: lab_db1
  gather_facts: false
  tasks:
    - name: What this lab expects from you
      ansible.builtin.debug:
        msg: >-
          Declare lists and lists of dicts in YAML, loop over them with loop_control: label, filter with when and reach nested fields
      run_once: true
