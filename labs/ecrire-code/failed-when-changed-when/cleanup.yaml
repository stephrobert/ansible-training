---
# Reset du lab failed-when-changed-when : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup failed-when-changed-when lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset path, state (failed-when-changed-when)
      ansible.builtin.file:
        path: "/tmp/failed-when-result.txt"
        state: "absent"
