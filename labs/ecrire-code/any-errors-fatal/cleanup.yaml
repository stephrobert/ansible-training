---
# Reset du lab any-errors-fatal : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup any-errors-fatal lab (lab_web1:lab_web2)
  hosts: lab_web1:lab_web2
  become: true
  gather_facts: false
  tasks:
    - name: Reset state (any-errors-fatal)
      ansible.builtin.shell: |
        rm -f /tmp/anyfatal-*.txt
      changed_when: false
      failed_when: false
