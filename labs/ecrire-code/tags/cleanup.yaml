---
# Reset du lab tags : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup tags lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset path, state (tags)
      ansible.builtin.file:
        path: "/tmp/challenge-tag-always.txt"
        state: "absent"
      failed_when: false
    - name: Reset path, state (tags)
      ansible.builtin.file:
        path: "/tmp/challenge-tag-configuration.txt"
        state: "absent"
      failed_when: false
    - name: Reset path, state (tags)
      ansible.builtin.file:
        path: "/tmp/challenge-tag-reset.txt"
        state: "absent"
      failed_when: false
