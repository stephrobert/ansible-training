---
# Reset du lab precedence-variables : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup precedence-variables lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset path, state (precedence-variables)
      ansible.builtin.file:
        path: "/tmp/precedence-result.txt"
        state: "absent"
