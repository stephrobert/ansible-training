---
# Reset du lab import-include : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup import-include lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset state (import-include)
      ansible.builtin.shell: |
        rm -f /tmp/lab30a-*
      changed_when: false
      failed_when: false
