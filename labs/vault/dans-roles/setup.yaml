---
# Mise en place du lab dans-roles : état de départ propre, puis brief.
# Rejouable : l'apprenant doit pouvoir recommencer autant qu'il veut.
- name: Setup dans-roles lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset path, state (dans-roles)
      ansible.builtin.file:
        path: "/tmp/lab81-secured-app.txt"
        state: "absent"
      failed_when: false

- name: Brief the learner (dans-roles)
  hosts: lab_db1
  gather_facts: false
  tasks:
    - name: What this lab expects from you
      ansible.builtin.debug:
        msg: >-
          Expose public variables in defaults/main.yml pointing to vault_* values in an encrypted vars/main.yml, and override them from the playbook
      run_once: true
