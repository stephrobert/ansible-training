---
# Reset du lab chiffrer-fichier-variable : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup chiffrer-fichier-variable lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset path, state (chiffrer-fichier-variable)
      ansible.builtin.file:
        path: "/tmp/lab78-challenge.txt"
        state: "absent"
      failed_when: false
