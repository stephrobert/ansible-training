---
# Reset du lab introduction : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup introduction lab (lab_web1)
  hosts: lab_web1
  become: true
  gather_facts: false
  tasks:
    - name: Reset path, state (introduction)
      ansible.builtin.file:
        path: "/tmp/lab77-vault-test.txt"
        state: "absent"
      failed_when: false
- name: Cleanup introduction lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset path, state (introduction)
      ansible.builtin.file:
        path: "/tmp/lab77-challenge-result.txt"
        state: "absent"
      failed_when: false
