---
# Mise en place du lab introduction : état de départ propre, puis brief.
# Rejouable : l'apprenant doit pouvoir recommencer autant qu'il veut.
- name: Setup introduction lab (lab_web1)
  hosts: lab_web1
  become: true
  gather_facts: false
  tasks:
    - name: Reset path, state (introduction)
      ansible.builtin.file:
        path: "/tmp/lab77-vault-test.txt"
        state: "absent"
      failed_when: false
- name: Setup introduction lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset path, state (introduction)
      ansible.builtin.file:
        path: "/tmp/lab77-challenge-result.txt"
        state: "absent"
      failed_when: false

- name: Brief the learner (introduction)
  hosts: lab_web1
  gather_facts: false
  tasks:
    - name: What this lab expects from you
      ansible.builtin.debug:
        msg: >-
          Encrypt a YAML file with ansible-vault, view it, edit it, consume it from a playbook, then rekey and decrypt it
      run_once: true
