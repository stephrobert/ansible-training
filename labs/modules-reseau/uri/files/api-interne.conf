# API d'inventaire interne du lab modules-reseau/uri.
#
# Déposé par setup.yaml, retiré par cleanup.yaml. Ne sert que ce lab : le
# port 80 de cet hôte appartient à d'autres labs, on n'y touche pas.
#
# Ce fichier remplace httpbin.org, dont l'indisponibilité rendait le lab rouge
# sans rapport avec ce qu'il enseigne. Les réponses sont volontairement
# DÉTERMINISTES : httpbin renvoyait un X-Amzn-Trace-Id unique par requête et
# l'adresse publique de l'appelant, ce qui rendait toute écriture de la
# réponse `changed` à chaque passage. Ici, rien ne bouge d'un appel à l'autre,
# donc le playbook de l'apprenant peut être réellement idempotent.

# escape=json : chaque ligne du journal est un objet JSON valide, que les tests
# relisent tel quel. Sans cette option, nginx échappe les guillemets du corps
# en \x22 et la ligne n'est plus analysable.
log_format lab_uri_json escape=json
    '{"methode":"$request_method","chemin":"$uri","statut":"$status",'
    '"agent":"$http_user_agent","corps":"$request_body"}';

server {
    listen 8009;
    server_name _;

    # Le journal est la PREUVE de l'appel. Il porte la méthode, le code rendu,
    # l'agent (ansible-httpget pour le module uri, autre chose pour un curl) et
    # le corps envoyé. Les tests le relisent : sans lui, rien ne distinguerait
    # un fichier produit par un vrai appel HTTP d'un fichier écrit à la main.
    access_log /var/log/nginx/lab-uri-api.log lab_uri_json;

    # GET : la charge utile de référence.
    location = /api/reference {
        default_type application/json;
        return 200 '{"api":"inventaire","version":"2026.1","environnements":["dev","preprod","prod"],"noeuds_declares":3}';
    }

    # POST : déclaration d'un nœud. Répond 201 (Created), et NON 200. C'est
    # délibéré : le `status_code: [200, 201]` du challenge devient une vraie
    # exigence, que le défaut du module (`[200]`) ne satisfait pas. httpbin
    # répondait toujours 200, donc cette consigne du lab n'était jamais
    # éprouvée : on pouvait l'oublier et le lab passait quand même.
    #
    # Le détour par proxy_pass n'est pas décoratif : la directive `return`
    # répond SANS jamais lire le corps de la requête, et `$request_body` reste
    # vide dans le journal (vérifié). En repassant par une location servie en
    # HTTP réel, nginx lit le corps, donc le journalise : c'est ce qui permet
    # aux tests de prouver que le bon corps JSON a été envoyé.
    location = /api/noeuds {
        limit_except POST {
            deny all;
        }
        proxy_pass http://127.0.0.1:8009/_recu;
    }

    location = /_recu {
        # Appelée par le proxy_pass ci-dessus, jamais par un client : la
        # directive `internal` ne conviendrait pas (la requête arrive en HTTP
        # réel, elle serait refusée), une ACL sur la boucle locale si.
        allow 127.0.0.1;
        deny all;
        access_log off;
        default_type application/json;
        return 201 '{"statut":"cree","ressource":"/api/noeuds/rhce"}';
    }

    location / {
        default_type application/json;
        return 404 '{"erreur":"endpoint inconnu"}';
    }
}
