---
# Mise en place du lab uri : une API REST interne, servie par nginx depuis
# l'hôte lab_api, puis état de départ propre sur db1.
# Rejouable : l'apprenant doit pouvoir recommencer autant qu'il veut.
#
# POURQUOI UNE API SERVIE ICI, ET PLUS httpbin.org
# ------------------------------------------------
# Ce lab tapait sur httpbin.org, service public gratuit et réputé instable.
# Mesuré depuis ce dépôt : sur cinq GET consécutifs, deux réponses 200 (dont
# une en 26 s), un délai dépassé au-delà de 40 s, et deux 503 ; en POST, trois
# 503 sur trois essais. Le lab était donc rouge pour une raison sans aucun
# rapport avec ce qu'il enseigne. Le sujet est le module uri, pas httpbin :
# seule l'URL change, la compétence est identique, et une API interne est même
# plus proche de ce qu'un RHCE rencontre en production.
#
# L'API est servie par lab_api (web2.lab), et non par db1 : la configuration
# nginx de db1 appartient aux labs de la section « roles », qui la remplacent
# et vont jusqu'à désinstaller le paquet. web2 est le seul nœud dont le
# nginx.conf est celui du paquet, donc le seul qui charge conf.d/*.conf.
- name: Setup uri lab (API REST interne sur lab_api)
  hosts: lab_api
  become: true
  gather_facts: true
  tasks:
    # mock-ex294 désinstalle nginx des trois managed nodes dans son propre
    # setup : ne jamais supposer le paquet présent.
    - name: Installer nginx, le seul serveur HTTP de la formation
      ansible.builtin.dnf:
        name: nginx
        state: present

    - name: Déposer le vhost de l'API d'inventaire interne
      ansible.builtin.copy:
        src: files/api-interne.conf
        dest: /etc/nginx/conf.d/lab-uri-api.conf
        owner: root
        group: root
        mode: "0644"

    # Le vhost fait un `proxy_pass` (connexion TCP, même vers 127.0.0.1). SELinux
    # interdit à nginx (domaine httpd_t) d'ouvrir une connexion réseau tant que
    # ce booléen est off : sans lui, l'API répond 502 Bad Gateway. Le setup doit
    # l'activer lui-même pour être auto-suffisant et ne pas dépendre d'un lab
    # précédent qui l'aurait laissé actif (l'isolation par snapshot le remet à off).
    - name: Autoriser nginx à ouvrir des connexions réseau (proxy_pass)
      ansible.posix.seboolean:
        name: httpd_can_network_connect
        state: true
        persistent: true

    # Le port 8009 est déjà étiqueté http_port_t par la politique SELinux
    # (80, 81, 443, 488, 8008, 8009, 8443, 9000) : aucun `seport` n'est requis.
    # Le piège serait 8080, étiqueté http_cache_port_t, où un seport ne sert à
    # rien, et 8888, réellement non étiqueté.
    - name: Ouvrir le port de l'API dans firewalld
      ansible.posix.firewalld:
        port: 8009/tcp
        state: enabled
        permanent: true
        immediate: true

    - name: Vérifier la configuration nginx avant de la charger
      ansible.builtin.command:
        cmd: nginx -t
      changed_when: false

    - name: Démarrer nginx et charger le vhost
      ansible.builtin.systemd_service:
        name: nginx
        state: reloaded
        enabled: true

    # Vider le journal EN PLACE : le réécrire créerait un nouvel inode, et
    # nginx continuerait d'écrire dans l'ancien, déjà supprimé. Les tests
    # liraient alors un journal vide et le lab échouerait sans raison visible.
    # `truncate` crée le fichier s'il manque : le premier passage marche aussi.
    - name: Remettre le journal d'accès de l'API à zéro
      ansible.builtin.command:
        cmd: truncate -s 0 /var/log/nginx/lab-uri-api.log
      changed_when: false

    # Si le nginx.conf de l'hôte n'incluait pas conf.d, le vhost ne serait pas
    # chargé et le port n'écouterait pas : échouer ici, fort, plutôt que de
    # laisser l'apprenant chercher pourquoi son appel uri ne répond pas.
    - name: Attendre que l'API réponde sur son port
      ansible.builtin.wait_for:
        port: 8009
        host: 127.0.0.1
        timeout: 30

- name: Setup uri lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    # Le DNS du réseau libvirt sert des enregistrements périmés : depuis db1,
    # web2.lab résout vers une adresse qui n'existe plus, et db1.lab vers ::1.
    # Le lab ne peut donc pas compter sur les noms du réseau. On publie notre
    # propre nom, construit depuis les FAITS de l'hôte qui sert l'API : aucune
    # adresse n'est codée, et le nom reste juste quand Terraform réattribue les
    # IP. Le bloc est marqué : le cleanup le retire sans toucher au reste.
    - name: Publier le nom de l'API interne dans /etc/hosts
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} LAB modules-reseau/uri"
        block: >-
          {{ hostvars[groups['lab_api'][0]]['ansible_default_ipv4']['address'] }} api-interne.lab
        state: present

    - name: Reset path, state (uri)
      ansible.builtin.file:
        path: "/opt/lab-uri-get.json"
        state: "absent"
      failed_when: false
    - name: Reset path, state (uri)
      ansible.builtin.file:
        path: "/opt/lab-uri-post.json"
        state: "absent"
      failed_when: false

- name: Brief the learner (uri)
  hosts: lab_db1
  gather_facts: false
  tasks:
    - name: What this lab expects from you
      ansible.builtin.debug:
        msg: >-
          Call a REST API with GET/POST and a JSON body, accept several status_code values, and loop a healthcheck with until/retries
      run_once: true
