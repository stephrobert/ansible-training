# Dépôt de référence interne du lab modules-reseau/get-url.
#
# Déposé par setup.yaml, retiré par cleanup.yaml. Ne sert que ce lab : le
# port 80 de cet hôte appartient à d'autres labs, on n'y touche pas.
#
# Ce fichier remplace www.gnu.org, dont le lab dépendait pour télécharger les
# textes de la GPL et de la LGPL. Mesuré depuis ce dépôt : des réponses en 10
# à 20 secondes et des délais dépassés environ une fois sur trois en rafale.
# Le lab échouait donc pour une raison sans rapport avec le module get_url.
# Les deux textes servis ici sont ceux que porte déjà chaque VM (paquet gmp) :
# le contenu est le même, la disponibilité n'est plus celle d'un tiers.

log_format lab_get_url_json escape=json
    '{"methode":"$request_method","chemin":"$uri","statut":"$status",'
    '"agent":"$http_user_agent"}';

server {
    listen 8008;
    server_name _;
    root /var/www/lab-get-url;

    # Le journal est la PREUVE de l'appel : il porte le chemin demandé, le code
    # rendu et l'agent (ansible-httpget pour get_url, autre chose pour un
    # curl). Les tests le relisent, et c'est notamment ce qui permet de vérifier
    # que le fichier de sommes de contrôle a bien été consulté.
    access_log /var/log/nginx/lab-get-url-depot.log lab_get_url_json;

    # Zone publique : le texte de la GPL v3 et sa somme de contrôle sha256,
    # publiée à côté du fichier comme le fait n'importe quel miroir sérieux.
    location /depot/ {
        autoindex off;
    }

    # Zone protégée : le texte de la LGPL v3, derrière une authentification
    # Basic. Sans identifiants, nginx rend 401 et le téléchargement échoue :
    # l'authentification du lab n'est donc pas décorative, elle est la
    # condition du succès.
    location /prive/ {
        auth_basic "Depot de reference interne";
        auth_basic_user_file /etc/nginx/lab-get-url.htpasswd;
        autoindex off;
    }

    location / {
        return 404;
    }
}
