---
# Mise en place du lab ansible-pull-gitops : état de départ propre, puis brief.
# Rejouable : l'apprenant doit pouvoir recommencer autant qu'il veut.
- name: Setup ansible-pull-gitops lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset state (ansible-pull-gitops)
      ansible.builtin.shell: |
        rm -rf /tmp/lab98-pull-marker.txt /var/lib/ansible-pull \
          /tmp/lab98-repo-pull /tmp/lab98-repo-pull.tgz
      changed_when: false
      failed_when: false

- name: Brief the learner (ansible-pull-gitops)
  hosts: lab_db1
  gather_facts: false
  tasks:
    - name: What this lab expects from you
      ansible.builtin.debug:
        msg: >-
          Run ansible-pull against a Git repository, schedule it with cron
          or a systemd timer, bootstrap it from cloud-init, then choose
          push or pull per use case
      run_once: true
