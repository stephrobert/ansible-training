---
# Reset du lab selinux : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup selinux lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset state (selinux)
      ansible.builtin.shell: |
        setsebool -P httpd_can_network_connect off; semanage fcontext -d '/var/www/myapp(/.*)?' 2>/dev/null; rm -rf /var/www/myapp; true
      changed_when: false
      failed_when: false
