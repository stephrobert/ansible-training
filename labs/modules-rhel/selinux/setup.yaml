---
# Mise en place du lab selinux : état de départ propre, puis brief.
# Rejouable : l'apprenant doit pouvoir recommencer autant qu'il veut.
- name: Setup selinux lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset state (selinux)
      ansible.builtin.shell: |
        setsebool -P httpd_can_network_connect off; semanage fcontext -d '/var/www/myapp(/.*)?' 2>/dev/null; rm -rf /var/www/myapp; true
      changed_when: false
      failed_when: false

- name: Brief the learner (selinux)
  hosts: lab_db1
  gather_facts: false
  tasks:
    - name: What this lab expects from you
      ansible.builtin.debug:
        msg: >-
          Switch SELinux to enforcing, flip a boolean persistently, and set a custom context with sefcontext followed by restorecon
      run_once: true
