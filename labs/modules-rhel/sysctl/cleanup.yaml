---
# Reset du lab sysctl : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup sysctl lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset path, state (sysctl)
      ansible.builtin.file:
        path: "/etc/sysctl.d/99-rhce-lab.conf"
        state: "absent"
