---
# Reset du lab mount : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup mount lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset path, state (mount)
      ansible.posix.mount:
        path: "/mnt/lab-data"
        state: "absent"
    - name: Reset state (mount)
      ansible.builtin.shell: |
        rm -f /opt/lab-disk.img; rmdir /mnt/lab-data 2>/dev/null; true
      changed_when: false
      failed_when: false
