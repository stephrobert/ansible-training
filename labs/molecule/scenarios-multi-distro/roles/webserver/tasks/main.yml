---
# tasks/main.yml : rôle MONO-DISTRO livré tel quel (RHEL uniquement).
# Votre mission (voir challenge/README.md) : le rendre portable
# RHEL + Debian sans dupliquer les tâches. Ce fichier, en l'état,
# échoue sur Debian (dnf absent, chemins et user différents).

- name: Installer nginx (RHEL uniquement)
  ansible.builtin.dnf:
    name: nginx
    state: present

- name: Créer le répertoire HTML (chemin RHEL en dur)
  ansible.builtin.file:
    path: /usr/share/nginx/html
    state: directory
    owner: nginx
    mode: "0755"

- name: Déployer la page d'accueil (chemin RHEL en dur)
  ansible.builtin.copy:
    dest: /usr/share/nginx/html/index.html
    content: "{{ webserver_index_content | default('Hello from ' + inventory_hostname) }}\n"
    mode: "0644"

- name: Démarrer et activer le service
  ansible.builtin.systemd_service:
    name: nginx
    state: started
    enabled: true
