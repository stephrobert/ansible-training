---
# verify.yml : À ÉCRIRE EN PREMIER (étape RED du cycle TDD).
#
# Écrivez ici les tests AVANT d'écrire le rôle. Ils doivent échouer tant
# que roles/users/tasks/main.yml est vide : c'est la preuve qu'ils
# testent quelque chose.
#
# Comportements à spécifier (au moins 4 assertions ansible.builtin.assert),
# d'après les données de converge.yml :
#   1. alice existe et son shell est /bin/zsh,
#   2. alice appartient au groupe wheel,
#   3. bob existe avec /bin/bash,
#   4. carol existe avec le shell par défaut (users_default_shell).
#
# Pattern : collecter l'état (getent via command + changed_when: false),
# puis asserter avec fail_msg explicite.

- name: Verify
  hosts: all
  gather_facts: false
  tasks: []
