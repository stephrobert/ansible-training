---
# Dépendances Galaxy DU SCÉNARIO (et non du rôle).
#
# containers.podman est ce qui crée réellement les instances : le driver
# « default » de Molecule se contente de déléguer à create.yml, qui appelle
# les modules de cette collection. Sans elle, le create meurt sur
# « couldn't resolve module containers.podman.podman_container ».
#
# La contrainte de version n'est pas un ornement : sans elle, Galaxy
# installe la dernière version publiée, et un test vert aujourd'hui peut
# virer au rouge demain sans qu'une seule ligne du dépôt ait bougé.

collections:
  - name: containers.podman
    version: ">=1.10.0,<2.0.0"
