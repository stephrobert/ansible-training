---
# Reset du lab replace : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup replace lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset path, state (replace)
      ansible.builtin.file:
        path: "/etc/myapp.conf"
        state: "absent"
