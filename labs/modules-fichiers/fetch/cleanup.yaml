---
# Reset du lab fetch : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup fetch lab (lab_web1)
  hosts: lab_web1
  become: true
  gather_facts: false
  tasks:
    - name: Reset path, state (fetch)
      ansible.builtin.file:
        path: "/etc/lab-tag.txt"
        state: "absent"
