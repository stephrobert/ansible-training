---
# Reset du lab file : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup file lab (lab_web1)
  hosts: lab_web1
  become: true
  gather_facts: false
  tasks:
    - name: Reset state (file)
      ansible.builtin.shell: |
        rm -rf /opt/myapp /var/log/myapp-init.timestamp /etc/myapp-old.conf
      changed_when: false
      failed_when: false
