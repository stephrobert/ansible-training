---
# Inventaire enrichi pour démontrer les patterns d'hôtes.
# Réutilise les VMs du lab + 2 hôtes "factices" pour les patterns avancés.
all:
  vars:
    # Aucun ansible_host ici : Terraform attribue les IP, les figer les rend
    # fausses au premier reprovisionnement. La résolution passe par le
    # ssh_config généré par dsoxlab, qui porte les adresses réelles.
    ansible_user: ansible
    ansible_ssh_common_args: >-
      -F {{ lookup('env', 'HOME') }}/.cache/dsoxlab/ansible-training/ssh_config
      -o StrictHostKeyChecking=no
      -o UserKnownHostsFile=/dev/null
    ansible_ssh_private_key_file: "{{ inventory_dir }}/../../../ssh/id_ed25519"
    ansible_python_interpreter: /usr/bin/python3.9

  children:
    webservers:
      hosts:
        web1.lab:
        web2.lab:

    dbservers:
      hosts:
        db1.lab:

    prod:
      children:
        webservers:
        dbservers:

    staging:
      hosts:
        web1.lab:    # web1 fait partie de staging ET prod (pour les patterns d'intersection)

    monitoring:
      hosts:
        db1.lab:     # db1 est aussi dans monitoring (intersection avec dbservers)
