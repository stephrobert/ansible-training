---
# Reset du lab idempotence-perfs : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup idempotence-perfs lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset state (idempotence-perfs)
      ansible.builtin.shell: |
        rm -f /tmp/lab91-*
      changed_when: false
      failed_when: false
