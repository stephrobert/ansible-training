---
# Reset du lab find : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup find lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset path, state (find)
      ansible.builtin.file:
        path: "/tmp/lab-find-cleanup"
        state: "absent"
      failed_when: false
