---
# Reset du lab assert-fail : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup assert-fail lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset path, state (assert-fail)
      ansible.builtin.file:
        path: "/tmp/lab-assert-validated.txt"
        state: "absent"
      failed_when: false
