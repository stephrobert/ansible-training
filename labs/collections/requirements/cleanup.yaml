---
# Reset du lab requirements : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup requirements lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset state (requirements)
      ansible.builtin.shell: |
        rm -f /tmp/lab94-*
      changed_when: false
      failed_when: false
