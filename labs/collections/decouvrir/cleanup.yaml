---
# Reset du lab decouvrir : rejouable, idempotent, jamais en échec.
# Les VMs sont partagées entre labs : ce qui traîne ici fausse le suivant.
- name: Cleanup decouvrir lab (lab_db1)
  hosts: lab_db1
  become: true
  gather_facts: false
  tasks:
    - name: Reset state (decouvrir)
      ansible.builtin.shell: |
        rm -f /tmp/lab93-*
      changed_when: false
      failed_when: false
